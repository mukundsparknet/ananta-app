spring.application.name=ananta-admin-backend
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ananta_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Timezone Configuration - Force IST (Indian Standard Time)
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata

# JWT Secret
jwt.secret=your-super-secret-jwt-key-that-should-be-very-long-and-secure
jwt.expiration=86400000

# Agora Configuration
agora.appId=1298c9c6945f4572bb6754755d2353b3
agora.certificate=8e6f12c451634b9783e78f36fff6fd98

# Multipart file upload limits (for KYC selfie/document images)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=50MB
